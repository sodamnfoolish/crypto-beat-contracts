type CryptoBeat @entity {
  id: ID!
  creator: Bytes!
  creatorTimestamp: BigInt!
  owner: Bytes!
  ownerTimestamp: BigInt!
  url: String!
  currentOnSaleCryptoBeatId: String!
}

type OnSaleCryptoBeat @entity {
  id: ID!
  onSale: Boolean!
  seller: Bytes!
  sellTimestamp: BigInt!
  buyer: Bytes!
  buyTimestamp: BigInt!
  cryptoBeatId: BigInt!
  cryptoBeatPrice: BigInt!
}
