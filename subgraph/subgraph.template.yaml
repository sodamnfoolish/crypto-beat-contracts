specVersion: 0.0.4
schema:
  file: ./schema.graphql
dataSources:
  - name: CryptoBeat
    kind: ethereum
    network: {{name}}
    source:
      address: "{{CryptoBeat}}"
      abi: CryptoBeat
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - Approval
        - ApprovalForAll
        - Transfer
      abis:
        - name: CryptoBeat
          file: ./abis/CryptoBeat.json
      eventHandlers:
        - event: Approval(indexed address,indexed address,indexed uint256)
          handler: handleApproval
        - event: ApprovalForAll(indexed address,indexed address,bool)
          handler: handleApprovalForAll
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
      file: ./src/crypto-beat.ts
  - name: CryptoBeatMarketplace
    kind: ethereum
    network: {{name}}
    source:
      address: "{{CryptoBeatMarketplace}}"
      abi: CryptoBeatMarketplace
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - Buy
        - Sell
      abis:
        - name: CryptoBeatMarketplace
          file: ./abis/CryptoBeatMarketplace.json
      eventHandlers:
        - event: Buy(address,address,uint256,uint256,uint256)
          handler: handleBuy
        - event: Sell(address,uint256,uint256)
          handler: handleSell
      file: ./src/crypto-beat-marketplace.ts
